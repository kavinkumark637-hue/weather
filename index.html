<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="style.css">
</head> 

<body>

<div class="card">

  <div class="search">
    <input type="text" placeholder="Enter city name" spellcheck="false">

    <button>
      
      <img src="images/search.png" alt="Search">
    </button>
  </div>
  
  <div class="error">
    <p id="error-msg">Invalid city name</p>
  </div>
  
  <div class="weather">
    <img src="images/rain.png" class="weather-icon" alt="Weather Icon">
    <h1 class="temp">22°C</h1>
    <h2 class="city">New York</h2>

    <!-- DATE & TIME ADDED HERE -->
    <div class="datetime">
      <p class="date" id="date"></p>
      <p class="time" id="time"></p>
    </div>

    <div class="details">
      <div class="col">
        <img src="images/humidity.png" alt="Humidity">
        <div>
          <p class="humidity">50%</p>
          <p>Humidity</p>
        </div>
      </div>
      <div class="col">
        <img src="images/wind.png" alt="Wind">
        <div>
          <p class="wind">15 km/h</p>
          <p>Wind Speed</p>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  const apiKey = "a64e7497707ca4d5af0b70679b574371";
  const apiUrl = "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

  const searchBox = document.querySelector(".search input");  //nput field inside .search class
  const searchBtn = document.querySelector(".search button");//Selects the search button
  const weatherIcon = document.querySelector(".weather-icon");//Selects the weather image icon
  async function checkWeather(city) {
    if (!city.trim()) 
    return;

    try {
      const response = await fetch(apiUrl + city + `&appid=${apiKey}`);
      if (response.status === 401) { //api key invalid
        document.getElementById("error-msg").innerHTML = "API key invalid or not activated.";
        document.querySelector(".error").style.display = "block";
        document.querySelector(".weather").style.display = "none";
        return;
      }

      if (response.status === 404) { //City wrong
        document.getElementById("error-msg").innerHTML = "Invalid city name";
        document.querySelector(".error").style.display = "block";
        document.querySelector(".weather").style.display = "none";
        return;
      }

      const data = await response.json();

      document.querySelector(".city").innerHTML = data.name;
      document.querySelector(".temp").innerHTML = Math.round(data.main.temp) + "°C";
      document.querySelector(".humidity").innerHTML = data.main.humidity + "%";
      document.querySelector(".wind").innerHTML = data.wind.speed + " km/h";

      const iconMap = {
        Clouds:  "images/clouds.png",
        Clear:   "images/clear.png",
        Rain:    "images/rain.png",
        Drizzle: "images/drizzle.png",
        Mist:    "images/mist.png",
        Snow:    "images/snow.png"
      };
      weatherIcon.src = iconMap[data.weather[0].main] || "images/rain.png"; //Changes icon dynamically.

      document.querySelector(".weather").style.display = "block"; //SHOW WEATHER
      document.querySelector(".error").style.display = "none"; //hide weather 

    } catch (error) {
      console.error("Network error:", error);
      document.getElementById("error-msg").innerHTML = "Network error. Check connection.";
      document.querySelector(".error").style.display = "block";
      document.querySelector(".weather").style.display = "none";
    }
  }

  searchBtn.addEventListener("click", () => {
    checkWeather(searchBox.value);
  });

  searchBox.addEventListener("keypress", function (event) {
    if (event.key === "Enter") {
      checkWeather(searchBox.value);
    }
  });
</script>
<script>
  function updateDateTime() {
    const now = new Date();
    const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
    document.getElementById('date').textContent = now.toLocaleDateString('en-US', dateOptions);
    document.getElementById('time').textContent = now.toLocaleTimeString('en-US', timeOptions);
  }
  updateDateTime();
  setInterval(updateDateTime, 1000);
</script>

</body>
</html>
